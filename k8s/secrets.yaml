#     -n fennec-test
#
#   kubectl create secret generic mac-mini-ssh \
#     --from-file=id_ed25519=~/.ssh/id_ed25519 \
#     -n fennec-test
#
#   kubectl create secret generic fennec-test-env \
#     --from-literal=FENNEC_AUTO_LOGIN_LOCAL='user@https://$SMOKE_DOMAIN' \
#     --from-literal=FENNEC_AUTO_LOGIN_PASSWORD_LOCAL='password' \
#     --from-literal=FENNEC_AUTO_LOGIN_MINI='mini@https://$SMOKE_DOMAIN' \
#     --from-literal=FENNEC_AUTO_LOGIN_PASSWORD_MINI='password' \
#     --from-literal=FENNEC_AUTO_JOIN_SERVER='<server-uuid>' \
#     --from-literal=FENNEC_AUTO_JOIN_CHANNEL='<channel-uuid>' \
#     -n fennec-test
