apiVersion: apps/v1
kind: Deployment
metadata:
  name: fennec-app-local
  namespace: fennec-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fennec-app-local
  template:
    metadata:
      labels:
        app: fennec-app-local
    spec:
      hostAliases:
        - ip: "${SMOKE_NODE_IP}"
          hostnames:
            - ${SMOKE_DOMAIN}
      initContainers:
        - name: trust-ca
          image: fennec-app-linux:latest
          imagePullPolicy: Never
          command:
            - sh
            - -c
            - |
              cp /extra-certs/*.crt /usr/local/share/ca-certificates/
              update-ca-certificates
              cp /etc/ssl/certs/ca-certificates.crt /shared-certs/ca-certificates.crt
          volumeMounts:
            - name: extra-certs
              mountPath: /extra-certs
              readOnly: true
            - name: shared-certs
              mountPath: /shared-certs
      containers:
        - name: fennec-app
          image: fennec-app-linux:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8310
            - containerPort: 5900
            - containerPort: 6080
          volumeMounts:
            - name: extra-certs
              mountPath: /extra-certs
              readOnly: true
            - name: shared-certs
              mountPath: /shared-certs
              readOnly: true
          env:
            - name: SSL_CERT_FILE
              value: /shared-certs/ca-certificates.crt
            - name: FENNEC_PROFILE
              value: default
            - name: FENNEC_NO_UPDATE
              value: "1"
            - name: FENNEC_AUTO_LOGIN
              valueFrom:
                secretKeyRef:
                  name: fennec-test-env
                  key: FENNEC_AUTO_LOGIN_LOCAL
            - name: FENNEC_AUTO_LOGIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: fennec-test-env
                  key: FENNEC_AUTO_LOGIN_PASSWORD_LOCAL
            - name: FENNEC_AUTO_JOIN_SERVER
              valueFrom:
                secretKeyRef:
                  name: fennec-test-env
                  key: FENNEC_AUTO_JOIN_SERVER
            - name: FENNEC_AUTO_JOIN_CHANNEL
              valueFrom:
                secretKeyRef:
                  name: fennec-test-env
                  key: FENNEC_AUTO_JOIN_CHANNEL
      volumes:
        - name: extra-certs
          configMap:
            name: fennec-api-ca
        - name: shared-certs
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: fennec-app-local
  namespace: fennec-test
spec:
  selector:
    app: fennec-app-local
  ports:
    - name: control
      port: 8310
      targetPort: 8310
    - name: vnc
      port: 5900
      targetPort: 5900
    - name: novnc
      port: 6080
      targetPort: 6080
      nodePort: 30608
  type: NodePort
