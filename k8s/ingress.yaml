# IngressRoute: $SMOKE_DOMAIN → fennec-api:7014 (TLS passthrough)
apiVersion: traefik.io/v1alpha1
kind: IngressRouteTCP
metadata:
  name: fennec-api
  namespace: fennec-test
spec:
  entryPoints:
    - websecure
  routes:
    - match: HostSNI(`${SMOKE_DOMAIN}`)
      services:
        - name: fennec-api
          port: 7014
  tls:
    passthrough: true
