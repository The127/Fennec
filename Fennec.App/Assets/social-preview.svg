<svg width="640" height="320" viewBox="0 0 640 320" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="640" height="320" fill="#1A1F2E"/>

  <!-- Glow behind logo -->
  <ellipse cx="194" cy="160" rx="90" ry="90" fill="#F39C12" fill-opacity="0.07"/>

  <!-- Logo: paths span x:20-80, y:20-80, center at (50,50).
       scale(1.5) then translate so (50,50) lands at (194,160):
       tx = 194 - 50*1.5 = 119, ty = 160 - 50*1.5 = 85 -->
  <g transform="translate(119, 85) scale(1.5)">
    <path fill="#F39C12" d="M 50,45 L 20,20 L 35,45 Z"/>
    <path fill="#F39C12" d="M 50,45 L 80,20 L 65,45 Z"/>
    <path fill="#E67E22" d="M 35,45 L 65,45 L 50,80 Z"/>
    <path fill="#2C3E50" d="M 45,70 L 55,70 L 50,80 Z"/>
  </g>

  <!-- Vertical divider -->
  <line x1="318" y1="96" x2="318" y2="224" stroke="#ffffff18" stroke-width="1"/>

  <!-- Text block -->
  <text x="352" y="148" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="700" fill="#F5F5F5" letter-spacing="-1">Fennec</text>
  <text x="354" y="182" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#9AA3B2" letter-spacing="0.2">Open-source, federated chat</text>
  <text x="354" y="204" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#9AA3B2" letter-spacing="0.2">Your server. Your data. Your rules.</text>
</svg>
