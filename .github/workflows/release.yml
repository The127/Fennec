name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        run: |
          echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          echo "OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Fennec.Api/Dockerfile
          push: true
          tags: ghcr.io/${{ steps.meta.outputs.OWNER }}/fennec-api:${{ github.ref_name }}
          build-args: VERSION=${{ steps.meta.outputs.VERSION }}

  desktop:
    strategy:
      matrix:
        include:
          - rid: win-x64
            os: windows-latest
          - rid: linux-x64
            os: ubuntu-latest
          - rid: osx-arm64
            os: macos-latest
          - rid: osx-x64
            os: macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Extract version
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build native library (Windows)
        if: matrix.rid == 'win-x64'
        shell: bash
        run: |
          cmake -S native -B native/build-windows -DCMAKE_BUILD_TYPE=Release
          cmake --build native/build-windows --config Release
          mkdir -p Fennec.App/runtimes/win-x64/native/
          cp native/build-windows/windows/Release/fennec_video.dll Fennec.App/runtimes/win-x64/native/

      - name: Publish
        shell: bash
        run: |
          dotnet publish Fennec.App.Desktop/Fennec.App.Desktop.csproj \
            -c Release \
            -r ${{ matrix.rid }} \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -p:Version=${{ steps.version.outputs.VERSION }} \
            -o publish/

      - name: Rename binary
        shell: bash
        run: |
          if [ "${{ matrix.rid }}" = "win-x64" ]; then
            mv publish/Fennec.App.Desktop.exe publish/fennec-${{ matrix.rid }}.exe
          else
            mv publish/Fennec.App.Desktop publish/fennec-${{ matrix.rid }}
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: fennec-${{ matrix.rid }}
          path: |
            publish/fennec-${{ matrix.rid }}.exe
            publish/fennec-${{ matrix.rid }}
          if-no-files-found: error

  release:
    needs: [docker, desktop]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: artifacts/*
